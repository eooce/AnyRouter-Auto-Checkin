name: Ayrouter Daily Check-in

# ============================================================
# 触发条件
# ============================================================
on:
  schedule:
    - cron: '0 2 * * *'
  # 支持手动触发
  workflow_dispatch:

# ============================================================
# 权限设置（用于更新 Secrets）
# ============================================================
permissions:
  actions: write
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ---------- 检出代码 ----------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- 安装 Python ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # ---------- 安装 Python 依赖 ----------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------- 安装 Playwright 浏览器 ----------
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # ---------- 运行领币脚本 ----------
      - name: Run check-in script
        env:
          USER_ID: ${{ secrets.USER_ID }}
          SESSION: ${{ secrets.SESSION }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }} # GitHub PAT（需要 repo 权限，用于更新 Secrets）
          GITHUB_REPOSITORY: ${{ github.repository }}
          SESSION_TTL_DAYS: ${{ vars.SESSION_TTL_DAYS || '7'}}           # Session 有效期配置（可选，默认 7 天 / 阈值 2 天）
          SESSION_THRESHOLD_DAYS: ${{ vars.SESSION_THRESHOLD_DAYS || '2' }}
          QUOTA_PER_DOLLAR: ${{ vars.QUOTA_PER_DOLLAR || '500000' }}
        run: python app.py

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
